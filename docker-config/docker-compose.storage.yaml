networks:
  nginx-manager_customnetwork:
    external: true

services:
  new-eews-postgres:
    networks:
      - nginx-manager_customnetwork
    restart: always
    image: postgres:13
    container_name: new-eews-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: