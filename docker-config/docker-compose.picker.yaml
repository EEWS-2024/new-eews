networks:
  nginx-manager_customnetwork:
    external: true
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1

services:
  new-eews-producer:
    pull_policy: "always"
    networks:
      nginx-manager_customnetwork:
        ipv4_address: 172.20.0.59
    restart: always
    image: docker.io/slackingdjaeger/eews-picker:latest
    container_name: new-eews-picker